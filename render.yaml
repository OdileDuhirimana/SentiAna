services:
  - type: web
    name: sentiana-api
    runtime: python
    buildCommand: pip install -r requirements-demo.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: DEMO_MODE
        value: "1"
      - key: JWT_SECRET
        generateValue: true
      - key: SENTIMENTSCOPE_API_KEY
        generateValue: true
